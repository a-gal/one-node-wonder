# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: huginn
  namespace: huginn
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 17.0.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: huginn
  values:
    TZ: Asia/Yekaterinburg
    image:
      repository: ghcr.io/huginn/huginn-single-process
      pullPolicy: IfNotPresent
      tag: latest@sha256:d2964e4d3c9ab7a7de8a676c7217517740aa250d3e96d4dd6695d547abcf1d47
    credentials:
      backup-cnpg:
        accessKey: ${VOLSYNC_ACCESS_KEY}
        bucket: backups.huginn.cnpg
        encrKey: "${VOLSYNC_ENCR_KEY}"
        name: backup-cnpg
        path: ""
        secretKey: ${VOLSYNC_SECRET_KEY}
        type: s3
        url: ${VOLSYNC_URL}
    securityContext:
      container:
        runAsUser: 1001
        runAsGroup: 568
        readOnlyRootFilesystem: false
        runAsNonRoot: true
    workload:
      main:
        podSpec:
          type: Deployment
          replicas: 1
          containers:
            main:
              command:
                - /scripts/init
              env: &huginn-env
                DOMAIN: huginn.${BASE_DOMAIN}
                DATABASE_ADAPTER: postgresql
                DATABASE_HOST: "{{ .Values.cnpg.main.creds.host }}"
                DATABASE_PORT: 5432
                DATABASE_NAME: "{{ .Values.cnpg.main.database }}"
                DATABASE_USERNAME: "{{ .Values.cnpg.main.user }}"
                DATABASE_PASSWORD: "{{ .Values.cnpg.main.creds.password }}"
                DO_NOT_CREATE_DATABASE: "true"

                # non-chart values?
                APP_SECRET_TOKEN: ${HUGINN_APP_SECRET_TOKEN}
                INVITATION_CODE: ${HUGINN_INVITATION_CODE}
              probes:
                readiness:
                  enabled: true
                  type: tcp
                  port: "{{ .Values.service.main.ports.main.port }}"
                liveness:
                  enabled: true
                  type: tcp
                  port: "{{ .Values.service.main.ports.main.port }}"
                startup:
                  enabled: true
                  type: tcp
                  port: "{{ .Values.service.main.ports.main.port }}"
      worker:
        enabled: true
        replicas: 1
        type: Deployment
        podSpec:
          containers:
            worker:
              primary: true
#              imageSelector: "{{ .Values.image }}"
              enabled: true
              command:
                - bash
                - -c
                - |
                    /scripts/init bin/threaded.rb | while read line; do 
                      echo "$line"
                      echo "ok" > /tmp/healthz_status
                    done &
                    # Wait for the background process to exit
                    wait $!
#              env: {{ .Values.workload.main.podSpec.containers.main.env | deepCopy }}
              env: *huginn-env
              probes:
                readiness:
                  enabled: false
                liveness:
                  enabled: true
                  type: exec
                  command:
                    - find
                    - /tmp/healthz_status
                    - -mmin
                    - "-1"
                  spec:
                    initialDelaySeconds: 60
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 3
                    successThreshold: 1
                startup:
                  enabled: false
    service:
      main:
        targetSelector: main
        ports:
          main:
            port: 3000
            protocol: http
            targetSelector: main
    cnpg:
      main:
        enabled: true
        cluster:
          storage:
            size: 2Gi
            storageClass: longhorn-cnpg
          walStorage:
            size: 2Gi
            storageClass: longhorn-cnpg
        pgVersion: 16
        user: huginn
        database: huginn_production
        # non-chart values
        mode: recovery
        backups:
          enabled: true
          revision: "1"
          credentials: backup-cnpg
        recovery:
          credentials: backup-cnpg

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: huginn.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          certManager:
            certificateIssuer: fiveoseven
            enabled: true
          homepage:
            enabled: true
            name: Huginn
            description: Create agents that monitor and act on your behalf. Your agents are standing by!
            icon: https://raw.githubusercontent.com/huginn/huginn/refs/heads/master/media/huginn-icon.svg
            group: Automation
            widget:
              enabled: false
